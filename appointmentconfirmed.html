<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experidental</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Calibri;
        }

        /*top bar*/
        header {
            width: 100%;
            background-color: #366c79;
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }

        nav {
            display: flex;
            gap: 10vh;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 20px;
            font-weight: 500;
            font-family: Arial;
        }

        nav a.active {
            text-decoration: underline;
        }

        /*background*/
        body {
            background-color: #cde0f2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /*all container*/
        .container {
            width: 100%;
            max-width: 650px;
            padding: 40px 20px;
            text-align: center;
        }

        /*request an appointment text*/
        h2 {
            color: #000000;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: bold;
            font-family: Calibri;
        }

        h3 {
            color: #3e713d;
            font-size: 20px;
            margin-bottom: 30px;
            font-family: Calibri;
        }

        h4 {
            color: #3e713d;
            font-size: 20px;
            margin-bottom: 45px;
            font-family: Calibri;
        }

        h5 {
            color: #3e713d;
            font-size: 24px;
            font-family: Calibri;
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="/index.html">Home</a>
            <a href="/services.html">Services</a>
            <a href="/about.html">About</a>
            <a href="/booknow.html" class="active">Book Now</a>
        </nav>
    </header>

    <div class="container">
        <h2>Appointment Request Sent!</h2>
        <h3>Your appointment has been confirmed!</h3>
        <h4>An email containing booking information will be sent shortly.</h4>
        <h5>Thank you.</h5>
                
    </div>

</body>
</html>
